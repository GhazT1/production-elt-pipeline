version: 2

sources:
  - name: netflix_raw
    description: >
      Raw Netflix dataset tables loaded from S3 by the Airflow pipeline.
      These tables are append-truncated on every daily run.
    database: "{{ var('raw_database') }}"
    schema: "{{ var('raw_schema') }}"

    freshness:
      warn_after: {count: 25, period: hour}
      error_after: {count: 49, period: hour}

    loaded_at_field: _LOADED_AT   # injected by data_load.py

    tables:
      - name: TITLES_RAW
        description: Netflix titles metadata — one row per show/movie.
        columns:
          - name: ID
            description: Unique Netflix content identifier.
            tests:
              - unique
              - not_null
          - name: TITLE
            tests:
              - not_null:
                  config:
                    severity: warn
          - name: TYPE
            tests:
              - not_null
              - accepted_values:
                  values: ["MOVIE", "SHOW"]
          - name: RELEASE_YEAR
            tests: [not_null]

      - name: CREDITS_RAW
        description: Cast and crew credits — one row per person per title.
        columns:
          - name: ID
            description: Foreign key to TITLES_RAW.ID.
            tests: [not_null]
          - name: NAME
            tests: [not_null]
          - name: ROLE
            tests:
              - not_null
              - accepted_values:
                  values: ["ACTOR", "DIRECTOR"]
